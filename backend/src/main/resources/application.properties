# ---------- Main settings ----------
server.port=8080
spring.application.name=secondhand-backend

# Default storage: SQLite (a simple file next to the project)
spring.datasource.url=jdbc:sqlite:secondhand.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

# ---------- JWT settings ----------
# secret must be long enough for HS256 (at least 32 characters)
app.jwt.secret=this-is-a-simple-student-project-secret-key-1405
app.jwt.expiration-ms=86400000

# ---------- Upload folder for advertisement images ----------
app.upload.dir=uploads
